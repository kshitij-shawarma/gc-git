event manager applet High_CPU authorization bypass
 action 0.0  syslog msg "High CPU DETECTED"
 action 1.01 cli command "enable"
 action 1.02 cli command "term length 0"
 action 1.03 cli command "show clock | append bootdisk:CPUlog.txt"
 action 1.04 cli command "show proc cpu sorted | append bootdisk:CPUlog.txt"
 action 1.05 cli command "show proc cpu his | append bootdisk:CPUlog.txt"
 action 1.06 cli command "debug netdr clear-capture rx"
 action 1.07 cli command "debug netdr capture rx"
 action 1.08 cli command "show logging | append bootdisk:CPUlog.txt"
 action 1.09 wait 20
 action 1.10 cli command "show clock | append bootdisk:CPUlog.txt"
 action 1.11 cli command "show netdr cap | append bootdisk:CPUlog.txt"
 action 1.12 cli command "undebug all"
 action 1.13 cli command "term length 24"
 action 1.14 cli command "exit"
!
