!


!
version 17.15
service nagle
service tcp-keepalives-in
service tcp-keepalives-out
service timestamps debug datetime msec localtime show-timezone
service timestamps log datetime msec localtime show-timezone
service password-encryption
service compress-config
service sequence-numbers
service counters max age 5
service call-home
!
hostname HTAINCHN25XXXDS001
!
!
vrf definition Mgmt-vrf
 !
 address-family ipv4
 exit-address-family
 !
 address-family ipv6
 exit-address-family
!
logging snmp-authfail
logging buffered 16384 informational
no logging console
no logging monitor
aaa new-model
!
!
aaa group server tacacs+ NetworkAdmins
 server-private 10.150.5.237 key 7 002C1047517B4A575B2D6C0D3D1C061F
 server-private 10.112.113.44 key 7 12310656472B4D557E27046B0730211B
 ip vrf forwarding HCL-CORP
 ip tacacs source-interface Loopback101
!
aaa authentication login default group NetworkAdmins local
aaa authentication enable default group NetworkAdmins enable none
aaa authorization console
aaa authorization config-commands
aaa authorization exec default group NetworkAdmins local if-authenticated 
aaa authorization commands 0 default group NetworkAdmins local if-authenticated 
aaa authorization commands 1 default group NetworkAdmins local if-authenticated 
aaa authorization commands 15 default group NetworkAdmins local if-authenticated 
aaa accounting exec default start-stop group NetworkAdmins
aaa accounting commands 0 default start-stop group NetworkAdmins
aaa accounting commands 1 default start-stop group NetworkAdmins
aaa accounting commands 15 default start-stop group NetworkAdmins
aaa accounting connection default start-stop group NetworkAdmins
aaa accounting system default start-stop group NetworkAdmins
!
!
aaa session-id common
clock timezone IST 5 30
boot system bootflash:packages.conf
switch 1 provision c9606r
    provision slot 1 C9600-LC-48YL
    provision slot 3 C9600-SUP-1
switch 2 provision c9606r
    provision slot 1 C9600-LC-48YL
    provision slot 3 C9600-SUP-1
power redundancy-mode switch 1 combined
power redundancy-mode switch 2 combined
ip icmp rate-limit unreachable 1000
