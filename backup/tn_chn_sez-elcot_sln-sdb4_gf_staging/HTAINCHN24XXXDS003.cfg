aaa authentication enable default group NetworkAdmins enable none
aaa authentication dot1x default group HCL-ISE
aaa authorization console
aaa authorization config-commands
aaa authorization exec default group NetworkAdmins local if-authenticated 
aaa authorization commands 0 default group NetworkAdmins local if-authenticated 
aaa authorization commands 1 default group NetworkAdmins local if-authenticated 
